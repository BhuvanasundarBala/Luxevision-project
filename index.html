<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXEVISION | NEXT-GEN FOOTWEAR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-green: #00ff88;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* Animated Gradient Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            z-index: -1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            letter-spacing: 4px;
            font-size: 22px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        /* Main Layout */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            padding: 20px;
        }

        .product-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(10px);
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .image-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 80%; height: 60%;
            background: var(--neon-blue);
            filter: blur(80px);
            opacity: 0.2;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .shoe-img {
            width: 100%;
            border-radius: 20px;
            transform: rotate(-5deg);
            transition: 0.5s ease;
        }

        .product-card:hover .shoe-img {
            transform: rotate(0deg) scale(1.05);
        }

        /* Neon Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            text-align: center;
            text-decoration: none;
        }

        .btn-standard {
            background: white;
            color: black;
        }

        .btn-neon {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .btn-neon:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* Footer Bar */
        .survey-bar {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            border-top: 1px solid var(--neon-green);
            text-align: center;
            z-index: 1001;
        }

        .link-neon {
            color: var(--neon-green);
            text-decoration: none;
            border: 1px solid var(--neon-green);
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        /* AR Overlay */
        #ar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 2000;
        }

        .close-btn {
            position: absolute;
            top: 30px; right: 30px;
            background: white; color: black;
            border-radius: 50%; width: 50px; height: 50px;
            border: none; font-weight: bold; z-index: 2001;
        }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 24px;">🛒</div>
    <div class="logo">LUXEVISION</div>
    <div style="width: 24px;"></div>
</div>

<div class="container">
    <div class="product-card">
        <div class="image-glow"></div>
        <img src="shoe.jpg" alt="Neon Shoe" class="shoe-img">
    </div>

    <div class="info-section">
        <h2 style="color: var(--neon-blue); letter-spacing: 2px;">PERFORMANCE LINE</h2>
        <h1 style="font-size: 50px; margin: 10px 0;">NEON PULSE<br>VELOCITY</h1>
        <p style="font-size: 28px; color: var(--neon-purple); font-weight: bold;">₹12,499.00</p>
        <p style="color: #aaa; line-height: 1.8;">Integrated bio-luminescent fiber optics with haptic feedback soles. Engineered for those who live in the future.</p>
        
        <div id="action-area"></div>
        
        <button onclick="toggleTest()" style="margin-top: 40px; background: none; border: 1px solid #333; color: #444; cursor: pointer; border-radius: 5px; font-size: 10px;">TEST TOGGLE</button>
    </div>
</div>

<div class="survey-bar">
    <span style="margin-right: 20px;">EXPERIMENT COMPLETE?</span>
    <a id="survey-link" href="#" target="_blank" class="link-neon">OPEN SURVEY</a>
</div>

<div id="ar-overlay">
    <button class="close-btn" onclick="stopAR()">✕</button>
    <a-scene embedded vr-mode-ui="enabled: false">
        <a-assets><img id="shoeAsset" src="shoe.jpg"></a-assets>
        <a-curvedimage src="#shoeAsset" height="2.5" radius="3" theta-length="60" position="0 1.5 -5">
            <a-animation attribute="rotation" to="0 360 0" dur="8000" repeat="indefinite" easing="linear"></a-animation>
        </a-curvedimage>
        <a-entity camera look-controls></a-entity>
    </a-scene>
</div>

<script>
    const LINK_A = "YOUR_FORM_A_LINK"; 
    const LINK_B = "YOUR_FORM_B_LINK";

    let isARGroup = Math.random() < 0.5;

    function renderPage() {
        const area = document.getElementById('action-area');
        const link = document.getElementById('survey-link');

        if (isARGroup) {
            area.innerHTML = '<button class="btn btn-neon" onclick="startAR()">✨ LAUNCH AR TRY-ON</button>';
            link.href = LINK_B;
        } else {
            area.innerHTML = '<button class="btn btn-standard">ADD TO BAG</button>';
            link.href = LINK_A;
        }
    }

    async function startAR() {
        try {
            await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('ar-overlay').style.display = 'block';
            document.querySelector('a-scene').resize();
        } catch (e) {
            alert("Camera needed for AR mode.");
        }
    }

    function stopAR() {
        document.getElementById('ar-overlay').style.display = 'none';
        location.reload();
    }

    function toggleTest() {
        isARGroup = !isARGroup;
        renderPage();
    }

    window.onload = renderPage;
</script>

</body>
</html>
