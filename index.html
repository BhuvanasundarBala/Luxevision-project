<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> BHUVAN| Shopping Experiment</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
        :root { --main-black: #1a1a1a; --accent-blue: #0071e3; --ar-green: #00ff88; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; color: var(--main-black); overflow-x: hidden; }
        
        /* Header & Cart */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; border-bottom: 1px solid #e5e5e5; background: white; position: sticky; top: 0; z-index: 100; }
        
        /* Product Layout */
        .main-content { max-width: 1100px; margin: 40px auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; padding: 0 20px; padding-bottom: 100px; }
        .image-container { position: relative; background: #f5f5f7; border-radius: 20px; min-height: 450px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 100%; border-radius: 10px; }

        /* Buttons */
        .btn { display: block; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; margin-bottom: 15px; text-align: center; text-decoration: none; }
        .btn-cart { background: var(--main-black); color: white; }
        .btn-ar { background: var(--accent-blue); color: white; box-shadow: 0 4px 15px rgba(0,113,227,0.4); }

        /* AR Full-Screen Overlay */
        #ar-experience { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: #000; }
        .exit-ar { position: absolute; top: 20px; right: 20px; z-index: 2001; padding: 10px 20px; background: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Survey Footer */
        .survey-footer { position: fixed; bottom: 0; width: 100%; background: #000; color: #fff; text-align: center; padding: 25px; z-index: 1001; }
        .survey-link { color: #50e3c2; font-weight: bold; text-decoration: none; border: 1px solid #50e3c2; padding: 8px 20px; border-radius: 5px; margin-left: 15px; }
    </style>
</head>
<body>
<div id="ar-experience" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000;">
    <button class="exit-ar" onclick="closeAR()" style="position: absolute; top: 20px; right: 20px; z-index: 2001; padding: 10px 20px; background: white; border-radius: 20px; font-weight: bold; cursor: pointer;">✕ Exit AR</button>
    
    <a-scene embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets><img id="shoeTexture" src="shoe.jpg"></a-assets>
        
        <a-curvedimage src="#shoeTexture" height="2" radius="3" theta-length="60" position="0 1.5 -4">
            <a-animation attribute="rotation" from="0 0 0" to="0 360 0" dur="10000" repeat="indefinite" easing="linear"></a-animation>
        </a-curvedimage>

        <a-entity camera look-controls></a-entity>
    </a-scene>
</div>

<script>
    const FORM_LINK_A = "YOUR_FORM_A_LINK"; 
    const FORM_LINK_B = "YOUR_FORM_B_LINK"; 

    let isGroupB = Math.random() < 0.5;

    function initExperiment() {
        const actionArea = document.getElementById('action-area');
        const surveyBtn = document.getElementById('survey-btn');

        if (isGroupB) {
            actionArea.innerHTML = '<button class="btn btn-ar" onclick="launchAR()">✨ Try it on with AR</button>';
            surveyBtn.href = FORM_LINK_B;
        } else {
            actionArea.innerHTML = '<button class="btn btn-cart">Add to Bag</button>';
            surveyBtn.href = FORM_LINK_A;
        }
    }

    async function launchAR() {
        try {
            // Force browser to ask for camera permission BEFORE showing the scene
            await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('ar-experience').style.display = 'block';
            // Resize scene to ensure it fills the screen
            document.querySelector('a-scene').resize();
        } catch (err) {
            alert("Camera access is blocked. Please enable it in your browser settings to see the AR shoe!");
            console.error(err);
        }
    }

    function closeAR() {
        document.getElementById('ar-experience').style.display = 'none';
        // Refresh page to kill the camera stream properly for the next user
        location.reload();
    }

    window.onload = initExperiment;
</script>
</body>
</html>
