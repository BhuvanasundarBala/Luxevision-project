<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeVision | Pro AR Try-On</title>
    <script src="https://cdn.jsdelivr.net/npm/deepar/js/deepar.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        #deepar-canvas { width: 100vw; height: 100vh; display: block; }
        
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .nav-header { pointer-events: auto; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; border: 1px solid #00f2ff; backdrop-filter: blur(10px); }
        .exit-btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        .footer-instruction { pointer-events: auto; background: rgba(0,0,0,0.8); padding: 20px; text-align: center; border-radius: 20px 20px 0 0; border-top: 2px solid #00ff88; }
        .survey-btn { background: #00ff88; color: #000; padding: 15px 30px; text-decoration: none; border-radius: 30px; font-weight: bold; display: inline-block; margin-top: 10px; }
        
        /* Scanning Animation */
        .scan-bar { position: absolute; width: 100%; height: 2px; background: #00ff88; top: 50%; left: 0; box-shadow: 0 0 15px #00ff88; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 20%; } 50% { top: 80%; } 100% { top: 20%; } }
    </style>
</head>
<body>

    <canvas id="deepar-canvas"></canvas>
    <div class="scan-bar"></div>

    <div class="ui-overlay">
        <div class="nav-header">
            <div style="color: #00f2ff; font-weight: bold;">AI FOOT TRACKING ACTIVE</div>
            <button class="exit-btn" onclick="window.location.href='index.html'">✕ Exit</button>
        </div>

        <div class="footer-instruction">
            <p style="color: white; margin: 0;">Point the camera at your feet to see the Neon-Pulse Velocity shoes.</p>
            <a href="YOUR_GOOGLE_FORM_B_LINK" class="survey-btn">Proceed to Survey</a>
        </div>
    </div>

    <script>
        (async function() {
            const canvas = document.getElementById('deepar-canvas');
            
            try {
                const deepAR = await deepar.initialize({
                    licenseKey: 'PASTE_YOUR_DEEPAR_LICENSE_KEY_HERE',
                    canvas: canvas,
                    effect: 'path/to/your/shoe_effect.deepar', // Upload this to your repo
                    additionalOptions: {
                        cameraConfig: { facingMode: 'environment' } // Uses back camera
                    }
                });

                console.log("DeepAR Initialized successfully");
            } catch (error) {
                console.error("DeepAR failed to load:", error);
                alert("Please ensure you are using HTTPS and have provided camera permissions.");
            }
        })();
    </script>
</body>
</html>
