<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LuxeVision | Retail Experiment</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        :root { --accent: #0071e3; --success: #00ff88; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: #fff; overflow-x: hidden; }
        
        /* Store UI */
        .store-header { padding: 15px 40px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 10; }
        .product-container { max-width: 1000px; margin: 40px auto; display: flex; flex-wrap: wrap; gap: 40px; padding: 20px; }
        .image-box { flex: 1; min-width: 300px; background: #f5f5f7; border-radius: 20px; padding: 20px; text-align: center; }
        .info-box { flex: 1; min-width: 300px; }
        
        /* Buttons */
        .btn { display: block; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; margin-bottom: 15px; text-decoration: none; text-align: center; }
        .btn-black { background: #000; color: #fff; }
        .btn-blue { background: var(--accent); color: #fff; }

        /* AR View Layer - FIXED: Set to absolute to not block camera */
        #ar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; }
        .close-ar { position: absolute; top: 20px; right: 20px; z-index: 1001; padding: 10px 20px; border-radius: 20px; border: none; background: #fff; font-weight: bold; cursor: pointer; }

        /* Footer */
        .survey-footer { position: fixed; bottom: 0; width: 100%; background: #000; color: #fff; text-align: center; padding: 20px; z-index: 100; }
        .survey-link { color: var(--success); font-weight: bold; text-decoration: none; border: 1px solid var(--success); padding: 5px 15px; border-radius: 5px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <button class="close-ar" onclick="stopAR()">✕ Exit AR</button>
        <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
            <a-assets><img id="shoeAsset" src="shoe.jpg"></a-assets>
            
            <a-marker-camera preset="hiro">
                </a-marker-camera>
            
            <a-entity position="0 1.5 -3">
                <a-image src="#shoeAsset" width="3" height="3" rotation="0 0 0">
                    <a-animation attribute="rotation" to="0 360 0" dur="8000" repeat="indefinite" easing="linear"></a-animation>
                </a-image>
            </a-entity>
        </a-scene>
    </div>

    <div class="store-header">
        <div style="font-size: 20px;">🛒</div>
        <div style="font-weight: bold; letter-spacing: 1px;">LUXEVISION</div>
        <div style="width:20px;"></div>
    </div>

    <div class="product-container">
        <div class="image-box">
            <img src="shoe.jpg" style="width: 100%; border-radius: 10px;">
        </div>
        <div class="info-box">
            <p style="color: #888; font-size: 12px; font-weight: bold;">NEW ARRIVAL / GROUP 7</p>
            <h1>Neon-Pulse Velocity</h1>
            <p style="font-size: 22px;">₹12,499.00</p>
            <p style="line-height: 1.6; color: #444;">Experience high-performance design with reactive cushioning technology.</p>
            
            <div id="action-area">
                </div>
        </div>
    </div>

    <div class="survey-footer">
        Step 2: <a id="survey-link" href="#" target="_blank" class="survey-link">Click here for Survey</a>
    </div>

    <script>
        // REPLACE WITH YOUR ACTUAL LINKS
        const FORM_A = "https://docs.google.com/forms/d/YOUR_LINK_A"; 
        const FORM_B = "https://docs.google.com/forms/d/YOUR_LINK_B"; 

        // Randomly assign group
        let isGroupB = Math.random() < 0.5;

        function init() {
            const area = document.getElementById('action-area');
            const sLink = document.getElementById('survey-link');

            if (isGroupB) {
                area.innerHTML = '<button class="btn btn-blue" onclick="startAR()">✨ Try it on with AR</button>';
                sLink.href = FORM_B;
            } else {
                area.innerHTML = '<button class="btn btn-black">Add to Bag</button>';
                sLink.href = FORM_A;
            }
        }

        function startAR() {
            // Check for camera permission first
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(() => {
                document.getElementById('ar-overlay').style.display = 'block';
                // AR.js needs a resize trigger to start the camera feed correctly
                window.dispatchEvent(new Event('resize'));
            })
            .catch(err => {
                alert("Please allow camera access to view the AR shoe.");
            });
        }

        function stopAR() {
            document.getElementById('ar-overlay').style.display = 'none';
            location.reload(); // Refresh to clean up camera memory
        }

        window.onload = init;
    </script>
</body>
</html>
